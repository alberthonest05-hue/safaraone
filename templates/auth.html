{% extends "base.html" %}
{% block title %}Sign In / Register — SafaraOne{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:28px">
      <a href="{{ url_for('index') }}" class="nav-logo" style="justify-content:center;margin-bottom:8px;display:inline-flex">
        <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor" opacity="0.9"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
        <span class="logo-text">Safara<span class="logo-accent">One</span></span>
      </a>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-top:4px">Tanzania's All-in-One Travel Platform</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" data-form="login" role="tab" id="tab-login">Sign In</button>
      <button class="auth-tab" data-form="register" role="tab" id="tab-register">Create Account</button>
    </div>

    <!-- Alert Container -->
    <!-- (Optional: keeping auth-error if needed, but the new script expects login-error/register-error inside the forms) -->

    <!-- Login Form -->
    <div id="form-login" class="auth-form-panel">
      <form id="login-form">
        <div id="login-error" style="display:none;color:red;margin-bottom:10px;"></div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Email Address / Username</label>
          <input type="text" id="login-username" class="form-input" placeholder="you@example.com" required autocomplete="username" style="width:100%" />
        </div>
        <div class="form-group" style="margin-bottom:8px">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" class="form-input" placeholder="••••••••" required id="login-password" autocomplete="current-password" style="width:100%;padding-right:48px" />
            <button type="button" onclick="togglePass('login-password')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
              <i data-lucide="eye" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>
        <div style="text-align:right;margin-bottom:20px">
          <a href="#" style="font-size:0.8rem;color:var(--amber)">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content:center">
          Sign In to SafaraOne
        </button>
      </form>
    </div>

    <!-- Register Form -->
    <div id="form-register" class="auth-form-panel" style="display:none">
      <form id="register-form">
        <div id="register-error" style="display:none;color:red;margin-bottom:10px;"></div>
        <div class="form-grid-2" style="margin-bottom:16px">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="register-username" class="form-input" placeholder="Username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="register-email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Account Type</label>
          <div style="display: flex; gap: 16px;">
            <label><input type="radio" name="role" value="tourist" checked> 🧳 Traveler</label>
            <label><input type="radio" name="role" value="guide"> 🧭 Tour Guide</label>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" class="form-input" placeholder="Min. 8 characters" required id="register-password" autocomplete="new-password" style="width:100%;padding-right:48px" />
            <button type="button" onclick="togglePass('register-password')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
              <i data-lucide="eye" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content:center">
          Create My Account
        </button>
        <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:12px;line-height:1.5">
          By registering you agree to our <a href="#" style="color:var(--amber)">Terms of Service</a> and <a href="#" style="color:var(--amber)">Privacy Policy</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePass(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {

    // LOGIN FORM
    const loginForm = document.getElementById('login-form');
    if (loginForm) {
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorBox = document.getElementById('login-error');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorBox.textContent = data.error || 'Login failed';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = 'Network error. Please try again.';
                errorBox.style.display = 'block';
            }
        });
    }

    // REGISTER FORM
    const registerForm = document.getElementById('register-form');
    if (registerForm) {
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const role = document.querySelector('input[name="role"]:checked')?.value || 'tourist';
            const errorBox = document.getElementById('register-error');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, email, password, role })
                });
                const data = await response.json();
                if (response.ok) {
                    // Auto login after register
                    const loginResp = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ username, password })
                    });
                    if (loginResp.ok) {
                        window.location.href = '/';
                    } else {
                        window.location.href = '/auth';
                    }
                } else {
                    errorBox.textContent = data.error || 'Registration failed';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = 'Network error. Please try again.';
                errorBox.style.display = 'block';
            }
        });
    }
});
</script>
{% endblock %}
