{% extends "base.html" %}
{% block title %}Sign In / Register — SafaraOne{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:28px">
      <a href="{{ url_for('index') }}" class="nav-logo" style="justify-content:center;margin-bottom:8px;display:inline-flex">
        <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor" opacity="0.9"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
        <span class="logo-text">Safara<span class="logo-accent">One</span></span>
      </a>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-top:4px">Tanzania's All-in-One Travel Platform</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" data-form="login" role="tab" id="tab-login">Sign In</button>
      <button class="auth-tab" data-form="register" role="tab" id="tab-register">Create Account</button>
    </div>

    <!-- Alert Container -->
    <div id="auth-error" class="alert alert-error" style="display:none; color: #f87171; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; border: 1px solid rgba(239, 68, 68, 0.2)"></div>

    <!-- Login Form -->
    <div id="form-login" class="auth-form-panel">
      <form onsubmit="handleAuth(event, 'login')">
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required autocomplete="username" style="width:100%" />
        </div>
        <div class="form-group" style="margin-bottom:8px">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" class="form-input" placeholder="••••••••" required id="login-pass" autocomplete="current-password" style="width:100%;padding-right:48px" />
            <button type="button" onclick="togglePass('login-pass')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
              <i data-lucide="eye" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>
        <div style="text-align:right;margin-bottom:20px">
          <a href="#" style="font-size:0.8rem;color:var(--amber)">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content:center">
          Sign In to SafaraOne
        </button>
      </form>
    </div>

    <!-- Register Form -->
    <div id="form-register" class="auth-form-panel" style="display:none">
      <form onsubmit="handleAuth(event, 'register')">
        <div class="form-grid-2" style="margin-bottom:16px">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" id="reg-fname" class="form-input" placeholder="Your name" required autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" id="reg-lname" class="form-input" placeholder="Your surname" required autocomplete="family-name" />
          </div>
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required autocomplete="email" style="width:100%" />
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Account Type</label>
          <select id="reg-role" class="form-select" style="width:100%">
            <option value="traveler">🧳 Traveler (book trips)</option>
            <option value="guide">🧭 Tour Guide (earn money)</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" class="form-input" placeholder="Min. 8 characters" required id="reg-pass" autocomplete="new-password" style="width:100%;padding-right:48px" />
            <button type="button" onclick="togglePass('reg-pass')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
              <i data-lucide="eye" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" style="justify-content:center">
          Create My Account
        </button>
        <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:12px;line-height:1.5">
          By registering you agree to our <a href="#" style="color:var(--amber)">Terms of Service</a> and <a href="#" style="color:var(--amber)">Privacy Policy</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePass(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
  const errDiv = document.getElementById('auth-error');
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
}

async function handleAuth(e, type) {
  e.preventDefault();
  const errDiv = document.getElementById('auth-error');
  errDiv.style.display = 'none';

  let url = '';
  let payload = {};

  if (type === 'login') {
    url = '/api/auth/login';
    // Send email as the username string since backend login expects username
    payload = {
      username: document.getElementById('login-email').value,
      password: document.getElementById('login-pass').value
    };
  } else {
    url = '/api/auth/register';
    const roleValue = document.getElementById('reg-role').value;
    payload = {
      // Storing email as username so login check succeeds later
      username: document.getElementById('reg-email').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-pass').value,
      role: roleValue === 'traveler' ? 'tourist' : 'guide'
    };
  }

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    const data = await res.json();
    
    if (!res.ok) {
      showError(data.error || 'Authentication failed. Please check your credentials.');
      return;
    }

    if (type === 'register') {
      // Login automatically upon successful registration
      const loginRes = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: payload.username,
          password: payload.password
        })
      });
      
      if (!loginRes.ok) {
        showError('Registration successful. Please switch to the Sign In tab to log into your new account.');
        return;
      }
    }

    // Since our backend sets the JWT HttpOnly cookies automatically, we don't need to manually 
    // inject tokens into localStorage. We can just safely navigate to the homepage.
    window.location.href = '/';

  } catch (err) {
    console.error('Network request failed:', err);
    showError('Network error connecting to the server. Please try again.');
  }
}
</script>
{% endblock %}
